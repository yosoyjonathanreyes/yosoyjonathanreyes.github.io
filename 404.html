<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Zona No Monitoreada | Alarmas Integradas</title>
  <link rel="icon" type="image/png" href="assets/images/marca/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:    #0a2249;
      --blue:    #0d2d5e;
      --yellow:  #fca907;
      --yellow-h:#d98e00;
      --white:   #ffffff;
      --black:   #070e1d;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Scanlines */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(255,255,255,0.012) 3px, rgba(255,255,255,0.012) 4px
      );
      pointer-events: none; z-index: 1;
    }

    /* Grid */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none; z-index: 0;
    }

    /* Logo */
    .site-logo { position: fixed; top: 24px; left: 32px; z-index: 10; }
    .site-logo img { height: 34px; }

    /* Corner brackets */
    .bracket { position: fixed; width: 48px; height: 48px; opacity: 0.25; z-index: 2; }
    .bracket-tr { top: 20px; right: 28px; border-top: 2px solid var(--yellow); border-right: 2px solid var(--yellow); }
    .bracket-bl { bottom: 48px; left: 28px; border-bottom: 2px solid var(--yellow); border-left: 2px solid var(--yellow); }

    /* Main container */
    .container {
      position: relative; z-index: 2;
      text-align: center;
      padding: 40px 24px 80px;
      max-width: 580px; width: 100%;
    }

    /* ── Vigí character ── */
    .vigi-wrap {
      display: inline-block;
      margin-bottom: 20px;
    }

    /* Float animation */
    .vigi-float {
      animation: charFloat 3.5s ease-in-out infinite;
    }
    @keyframes charFloat {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-12px); }
    }

    /* Eye blink */
    .eye-inner {
      transform-box: fill-box;
      transform-origin: center;
      animation: eyeBlink 5s ease-in-out infinite;
    }
    @keyframes eyeBlink {
      0%, 82%, 100% { transform: scaleY(1); }
      88%           { transform: scaleY(0.06); }
      94%           { transform: scaleY(1); }
    }

    /* Right arm wave */
    .arm-right {
      transform-box: fill-box;
      transform-origin: 148px 128px;
      animation: armWave 2.4s ease-in-out infinite;
    }
    @keyframes armWave {
      0%, 100% { transform: rotate(0deg); }
      30%      { transform: rotate(-18deg); }
      60%      { transform: rotate(8deg); }
    }

    /* REC dot blink */
    .rec-dot {
      animation: recBlink 1s step-end infinite;
    }
    @keyframes recBlink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0; }
    }

    /* Shadow breathing */
    .char-shadow {
      transform-box: fill-box;
      transform-origin: center;
      animation: shadowPulse 3.5s ease-in-out infinite;
    }
    @keyframes shadowPulse {
      0%, 100% { transform: scaleX(1);   opacity: 0.25; }
      50%       { transform: scaleX(0.7); opacity: 0.12; }
    }

    /* Vigí name tag */
    .vigi-name {
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      color: var(--yellow);
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0.75;
    }

    /* Alert badge */
    .alert-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--yellow); color: var(--black);
      font-size: 0.68rem; font-weight: 800;
      letter-spacing: 0.14em; text-transform: uppercase;
      padding: 5px 14px; border-radius: 4px;
      margin-bottom: 20px;
    }
    .alert-badge svg { width: 12px; height: 12px; flex-shrink: 0; }

    /* 404 */
    .error-code {
      font-size: clamp(5.5rem, 20vw, 9rem);
      font-weight: 900; line-height: 1;
      letter-spacing: -6px;
      color: transparent;
      -webkit-text-stroke: 2px rgba(255,255,255,0.12);
      margin-bottom: 6px;
      user-select: none;
    }
    .error-code .mid { -webkit-text-stroke: 2px rgba(252,169,7,0.35); }

    /* Heading */
    h1 {
      font-size: clamp(1.3rem, 4vw, 1.9rem);
      font-weight: 800; color: var(--white);
      margin-bottom: 12px; line-height: 1.25;
    }
    h1 span { color: var(--yellow); }

    /* Subtext */
    .sub {
      font-size: 1rem; color: rgba(255,255,255,0.75);
      line-height: 1.75; max-width: 400px;
      margin: 0 auto 32px;
    }

    /* CTA */
    .btn-home {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--yellow); color: var(--black);
      font-size: 0.95rem; font-weight: 700;
      padding: 14px 32px; border-radius: 10px;
      text-decoration: none;
      box-shadow: 0 4px 24px rgba(252,169,7,0.35);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-home:hover {
      background: var(--yellow-h);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(252,169,7,0.45);
    }
    .btn-home svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* Status bar */
    .status-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(7,14,29,0.85);
      border-top: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(8px);
      padding: 7px 24px;
      display: flex; align-items: center;
      justify-content: space-between; gap: 16px;
      font-size: 0.68rem; color: rgba(255,255,255,0.3);
      font-family: 'Courier New', monospace;
      letter-spacing: 0.06em; z-index: 10;
    }
    .status-indicator { display: flex; align-items: center; gap: 6px; }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #ff3d3d;
      animation: recBlink 0.9s step-end infinite;
    }

    @media (max-width: 480px) {
      .site-logo img { height: 28px; }
      .status-bar .status-right { display: none; }
      .bracket { display: none; }
    }
  </style>
</head>
